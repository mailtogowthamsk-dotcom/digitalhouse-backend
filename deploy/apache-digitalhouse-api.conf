# Apache snippet — proxy Node API without redirects on OPTIONS
# Include inside VirtualHost for www.infosensetechnologies.com
#
# 1) Start Node: cd backend && npm run build && node dist/server.js  (PORT=4000)
# 2) Enable modules: a2enmod proxy proxy_http headers rewrite
# 3) Do NOT apply global RewriteRule www redirects to /digitalhouse/backend

<Location /digitalhouse/backend/>
    ProxyPreserveHost On
    # Strip /digitalhouse/backend prefix — Node listens on /api/...
    ProxyPass http://127.0.0.1:4000/ retry=0
    ProxyPassReverse http://127.0.0.1:4000/
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # CORS when Apache answers OPTIONS before Node (required for some hosts)
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Admin-Key, Accept"
    Header always set Access-Control-Allow-Credentials "true"
    SetEnvIf Origin "^https?://(www\.)?infosensetechnologies\.com$" CORS_ORIGIN=$0
    Header always set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN
</Location>

# If you use RewriteRule for www, exclude API:
# RewriteCond %{REQUEST_URI} !^/digitalhouse/backend
