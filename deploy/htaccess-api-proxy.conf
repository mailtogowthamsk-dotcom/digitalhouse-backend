# Merge into public_html/digitalhouse/backend/.htaccess
# Requires mod_rewrite + mod_proxy (+ AllowOverride for [P]).
# Node must run: PORT=4000 node dist/server.js (or PM2 / cPanel Node app on 4000).

<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /digitalhouse/backend/

  # Do not proxy existing files (uploads, static)
  RewriteCond %{REQUEST_FILENAME} -f [OR]
  RewriteCond %{REQUEST_FILENAME} -d
  RewriteRule ^ - [L]

  RewriteRule ^(.*)$ http://127.0.0.1:4000/$1 [P,L]
</IfModule>

<IfModule mod_headers.c>
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
</IfModule>
