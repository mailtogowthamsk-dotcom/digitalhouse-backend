# public_html/digitalhouse/backend/.htaccess
# PM2: digitalhouse-api on 127.0.0.1:4000
#
# CORS is handled by Node (backend/src/config/cors.ts).
# Do NOT add Access-Control-* headers here — duplicates break the admin UI.

<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /digitalhouse/backend/

  RewriteCond %{REQUEST_FILENAME} -f [OR]
  RewriteCond %{REQUEST_FILENAME} -d
  RewriteRule ^ - [L]

  RewriteRule ^(.*)$ http://127.0.0.1:4000/$1 [P,L]
</IfModule>

<IfModule mod_headers.c>
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
</IfModule>
